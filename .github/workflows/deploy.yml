name: CI and Deploy

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

env:
  GCP_PROJECT_ID: eighth-brace-379306
  GCP_REGION: asia-south1
  REGISTRY_HOST: asia-south1-docker.pkg.dev
  ARTIFACT_REGISTRY_REPOSITORY: wesko-backend
  IMAGE_NAME: wesko-api
  PRODUCTION_SERVICE: wesko-api
  STAGING_SERVICE: wesko-api-staging
  RUNTIME_SERVICE_ACCOUNT: wesko-runtime@eighth-brace-379306.iam.gserviceaccount.com

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Verify formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover

  build-and-publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - quality
    permissions:
      contents: read
      id-token: write
    outputs:
      image_ref: ${{ steps.meta-vars.outputs.image_uri }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build variables
        id: meta-vars
        shell: bash
        run: |
          set -euo pipefail
          image_uri="${REGISTRY_HOST}/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${GITHUB_SHA::12}"
          fi
          {
            echo "image_uri=${image_uri}"
            echo "version=${version}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.meta-vars.outputs.image_uri }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref_name, 'v0.') }}
          labels: |
            org.opencontainers.image.title=wesko-api
            org.opencontainers.image.description=Wesko backend API
            org.opencontainers.image.vendor=Wesko

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta-vars.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta-vars.outputs.build_date }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image
        env:
          IMAGE_REF: ${{ steps.meta-vars.outputs.image_uri }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

      - name: On-demand vulnerability scan
        env:
          IMAGE_REF: ${{ steps.meta-vars.outputs.image_uri }}@${{ steps.build.outputs.digest }}
        run: ./scripts/check-vulnerabilities.sh "${IMAGE_REF}"

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - build-and-publish
    concurrency:
      group: deploy-${{ github.ref_name }}
      cancel-in-progress: false
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set deployment variables
        id: deploy-vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "environment=production" >> "${GITHUB_OUTPUT}"
            echo "service=${PRODUCTION_SERVICE}" >> "${GITHUB_OUTPUT}"
          else
            echo "environment=staging" >> "${GITHUB_OUTPUT}"
            echo "service=${STAGING_SERVICE}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Rotate runtime secrets in Secret Manager
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          env_name="${{ steps.deploy-vars.outputs.environment }}"
          ./scripts/sync-secret.sh "${env_name}" DATABASE_URL "wesko-database-url-${env_name}"
          ./scripts/sync-secret.sh "${env_name}" JWT_SECRET "wesko-jwt-secret-${env_name}"
          ./scripts/sync-secret.sh "${env_name}" RAZORPAY_KEY_ID "wesko-razorpay-key-id-${env_name}"
          ./scripts/sync-secret.sh "${env_name}" RAZORPAY_KEY_SECRET "wesko-razorpay-key-secret-${env_name}"

      - name: Deploy to Cloud Run
        env:
          ENVIRONMENT: ${{ steps.deploy-vars.outputs.environment }}
          SERVICE_NAME: ${{ steps.deploy-vars.outputs.service }}
          IMAGE_REF: ${{ needs.build-and-publish.outputs.image_ref }}
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: ./scripts/deploy-cloudrun.sh "${ENVIRONMENT}" "${IMAGE_REF}"
